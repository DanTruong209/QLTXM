<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/user-layout :: head('Đặt xe | QLTXM')}"></head>
<body th:replace="~{fragments/user-layout :: layout(
        'Đặt xe | QLTXM',
        'Gửi yêu cầu thuê xe',
        'Tạo yêu cầu thuê xe máy',
        null,
        null,
        ~{::#pageContent},
        null
    )}">

<div id="pageContent">
    <div class="flash error" th:if="${formError}" th:text="${formError}"></div>

    <section class="panel">
        <form th:action="@{/user/rentals/checkout}" th:object="${userRentalForm}" method="post" class="form-grid">
                <label class="full-width">
                    <span>Chọn xe máy</span>
                    <select th:field="*{motorbikeId}">
                        <option value="">Chọn xe</option>
                        <option th:each="motorbike : ${availableBikes}"
                                th:value="${motorbike.id}"
                                th:text="${motorbike.code + ' - ' + motorbike.brand + ' ' + motorbike.model + ' - ' + #numbers.formatDecimal(motorbike.dailyRate, 0, 'COMMA', 0, 'POINT') + ' VND/ngày'}"></option>
                    </select>
                    <small class="field-error" th:errors="*{motorbikeId}"></small>
                </label>
                <label>
                    <span>Ngày bắt đầu</span>
                    <input type="date" th:field="*{startDate}">
                    <small class="field-error" th:errors="*{startDate}"></small>
                </label>
                <label>
                    <span>Ngày kết thúc</span>
                    <input type="date" th:field="*{endDate}">
                    <small class="field-error" th:errors="*{endDate}"></small>
                </label>
                <label>
                    <span>Tiền cọc</span>
                    <input type="number" step="1000" min="0" th:field="*{depositAmount}">
                    <small class="field-error" th:errors="*{depositAmount}"></small>
                </label>
                <label class="full-width">
                    <span>Ghi chú</span>
                    <textarea rows="4" th:field="*{notes}"></textarea>
                    <small class="field-error" th:errors="*{notes}"></small>
                </label>
                <div class="form-actions full-width">
                    <button class="btn btn-primary" type="submit">Tiếp tục thanh toán</button>
                </div>
        </form>
    </section>
</div>

</body>
</html>
