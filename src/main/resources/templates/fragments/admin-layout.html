<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">QLTXM</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:fragment="layout(title, activeNav, headerTitle, headerSubtitle, actions, content, extraScripts)">
<div class="app-shell">
    <aside class="sidebar">
        <div>
            <p class="eyebrow">QLTXM</p>
            <h1 class="brand-title">
                <span class="brand-icon">🏍️</span>
                Quản lý thuê xe máy
            </h1>
            <p class="muted">Bảng điều hành dành cho quản trị viên: quản lý xe, khách hàng, phiếu thuê và theo dõi doanh thu.</p>
        </div>
        <nav class="nav-links">
            <a th:classappend="${activeNav} == 'dashboard' ? ' active' : ''" th:href="@{/}">Tổng quan</a>
            <a th:classappend="${activeNav} == 'motorbikes' ? ' active' : ''" th:href="@{/motorbikes}">Xe máy</a>
            <a th:classappend="${activeNav} == 'customers' ? ' active' : ''" th:href="@{/customers}">Khách hàng</a>
            <a th:classappend="${activeNav} == 'rentals' ? ' active' : ''" th:href="@{/rentals}">Phiếu thuê</a>
            <a th:classappend="${activeNav} == 'tracking' ? ' active' : ''" th:href="@{/tracking}">Theo dõi</a>
        </nav>
    </aside>

    <main class="content">
        <div class="page-header">
            <div>
                <p class="eyebrow" th:if="${headerSubtitle}" th:text="${headerSubtitle}">Bảng điều khiển</p>
                <h2 th:text="${headerTitle}">Trang</h2>
            </div>
            <div class="action-row" th:if="${actions}">
                <div th:replace="${actions}"></div>
            </div>
        </div>

        <div class="narrow" th:replace="${content}"></div>
    </main>
</div>

<div th:if="${extraScripts}">
    <div th:replace="${extraScripts}"></div>
</div>
</body>
</html>
