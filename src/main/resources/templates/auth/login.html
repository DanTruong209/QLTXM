<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/auth-layout :: head('Đăng nhập | QLTXM')}"></head>
<body th:replace="~{fragments/auth-layout :: layout(
        'Đăng nhập | QLTXM',
        'Truy cập QLTXM',
        'Đăng nhập hệ thống',
        'Quản trị viên xử lý xe, khách hàng, đơn thuê và doanh thu. Người dùng theo dõi xe và gửi yêu cầu thuê.',
        ~{::#pageContent}
    )}">

<div id="pageContent">
    <div class="flash success" th:if="${param.registered}">Đăng ký thành công. Hãy đăng nhập.</div>
    <div class="flash success" th:if="${param.logout}">Đã đăng xuất khỏi hệ thống.</div>
    <div class="flash error" th:if="${param.error}">Sai tên đăng nhập hoặc mật khẩu.</div>

    <form th:action="@{/login}" method="post" class="form-grid single-column">
        <label>
            <span>Tên đăng nhập</span>
            <input type="text" name="username" required>
        </label>
        <label>
            <span>Mật khẩu</span>
            <input type="password" name="password" required>
        </label>
        <div class="form-actions full-width">
            <button class="btn btn-primary auth-btn" type="submit">Đăng nhập</button>
        </div>
    </form>

    <div class="auth-links">
        <a class="text-link" th:href="@{/register}">Đăng ký tài khoản người dùng</a>
    </div>

    <div class="demo-box">
        <p><strong>Quản trị mặc định:</strong> admin / admin123</p>
        <p><strong>Tài khoản người dùng:</strong> user / user123</p>
    </div>
</div>

</body>
</html>
