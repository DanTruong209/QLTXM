<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Khách hàng | QLTXM')}"></head>
<body th:replace="~{fragments/admin-layout :: layout(
        'Khách hàng | QLTXM',
        'customers',
        'Quản lý khách hàng',
        'Danh mục',
        ~{::#headerActions},
        ~{::#pageContent},
        null
    )}">

<div id="headerActions">
    <a class="btn btn-primary" th:href="@{/customers/new}">Thêm khách hàng</a>
</div>

<div id="pageContent">
    <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <section class="panel">
        <form method="get" th:action="@{/customers}" class="filter-bar">
            <input type="text" name="q" th:value="${keyword}" placeholder="Tìm theo họ tên, số điện thoại, CCCD, địa chỉ">
            <button class="btn btn-secondary" type="submit">Tìm kiếm</button>
            <a class="btn btn-secondary" th:href="@{/customers}">Đặt lại</a>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Họ tên</th>
                    <th>Số điện thoại</th>
                    <th>CCCD/CMND</th>
                    <th>Địa chỉ</th>
                    <th>Ghi chú</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.fullName}">Nguyễn Văn An</td>
                    <td th:text="${customer.phone}">0901234567</td>
                    <td th:text="${customer.idCard}">079123456789</td>
                    <td th:text="${customer.address ?: 'Không có'}">Hồ Chí Minh</td>
                    <td th:text="${customer.notes ?: 'Không có'}">Không có</td>
                    <td><a class="text-link" th:href="@{'/customers/' + ${customer.id} + '/edit'}">Sửa</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="6">
                        <div class="empty-state">Không có khách hàng nào khớp với điều kiện tìm kiếm.</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

</body>
</html>
