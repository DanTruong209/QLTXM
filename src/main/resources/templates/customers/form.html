<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head(${pageTitle} + ' | QLTXM')}"></head>
<body th:replace="~{fragments/admin-layout :: layout(
        ${pageTitle} + ' | QLTXM',
        'customers',
        ${pageTitle},
        'Khách hàng',
        ~{::#headerActions},
        ~{::#pageContent},
        null
    )}">

<div id="headerActions">
    <a class="btn btn-secondary" th:href="@{/customers}">Quay lại</a>
</div>

<div id="pageContent">
    <section class="panel">
        <form th:object="${customer}"
              th:action="${customer.id} == null ? @{/customers} : @{'/customers/' + ${customer.id}}"
              method="post"
              class="form-grid">
                <label>
                    <span>Họ và tên</span>
                    <input type="text" th:field="*{fullName}">
                    <small class="field-error" th:errors="*{fullName}"></small>
                </label>
                <label>
                    <span>Số điện thoại</span>
                    <input type="text" th:field="*{phone}">
                    <small class="field-error" th:errors="*{phone}"></small>
                </label>
                <label>
                    <span>CCCD/CMND</span>
                    <input type="text" th:field="*{idCard}">
                    <small class="field-error" th:errors="*{idCard}"></small>
                </label>
                <label>
                    <span>Địa chỉ</span>
                    <input type="text" th:field="*{address}">
                    <small class="field-error" th:errors="*{address}"></small>
                </label>
                <label class="full-width">
                    <span>Ghi chú</span>
                    <textarea rows="4" th:field="*{notes}"></textarea>
                    <small class="field-error" th:errors="*{notes}"></small>
                </label>
                <div class="form-actions full-width">
                    <button class="btn btn-primary" type="submit">Lưu thông tin khách hàng</button>
                </div>
        </form>
    </section>
</div>

</body>
</html>
