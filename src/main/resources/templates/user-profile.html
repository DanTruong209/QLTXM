<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/user-layout :: head('Hồ sơ người dùng | QLTXM')}"></head>
<body th:replace="~{fragments/user-layout :: layout(
        'Hồ sơ người dùng | QLTXM',
        'Hồ sơ cá nhân',
        'Cập nhật thông tin người dùng',
        null,
        null,
        ~{::#pageContent},
        null
    )}">

<div id="pageContent">
    <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="flash error" th:if="${formError}" th:text="${formError}"></div>

    <section class="panel">
        <form th:action="@{/user/profile}" th:object="${profileForm}" method="post" class="form-grid">
                <label>
                    <span>Họ và tên</span>
                    <input type="text" th:field="*{fullName}">
                    <small class="field-error" th:errors="*{fullName}"></small>
                </label>
                <label>
                    <span>Số điện thoại</span>
                    <input type="text" th:field="*{phone}">
                    <small class="field-error" th:errors="*{phone}"></small>
                </label>
                <label>
                    <span>CCCD/CMND</span>
                    <input type="text" th:field="*{idCard}">
                    <small class="field-error" th:errors="*{idCard}"></small>
                </label>
                <label>
                    <span>Địa chỉ</span>
                    <input type="text" th:field="*{address}">
                    <small class="field-error" th:errors="*{address}"></small>
                </label>
                <label class="full-width">
                    <span>Ghi chú</span>
                    <textarea rows="4" th:field="*{notes}"></textarea>
                    <small class="field-error" th:errors="*{notes}"></small>
                </label>
                <div class="form-actions full-width">
                    <button class="btn btn-primary" type="submit">Lưu hồ sơ</button>
                </div>
        </form>
    </section>
</div>

</body>
</html>
